name: News Pipeline

on:
  workflow_dispatch:

  # Scheduled execution using UTC time (GitHub Actions uses UTC).
  # Approximate Danish time (CET = UTC+1, CEST = UTC+2 in summer).
  schedule:
    - cron: "0 9 * * 1-5"   # ~10:00 DK winter
    - cron: "0 12 * * 1-5"  # ~13:00 DK winter
    - cron: "0 14 * * 1-5"  # ~15:00 DK winter
    - cron: "0 22 * * 1-5"  # ~23:00 DK winter

permissions:
  contents: write

jobs:
  run-news-pipeline:
    runs-on: ubuntu-latest

    steps:

      # Checkout repository so the workflow can access the code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history allows safe pushes later

      # Install Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Ensure folders exist (GitHub runners start with empty filesystem)
      - name: Prepare folders
        run: |
          mkdir -p data
          mkdir -p outputs

      # Execute the news ingestion pipeline
      - name: Run pipeline
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}   # API key stored in GitHub Secrets
          TICKERS: AAPL
          NEWS_LIMIT: 15
          LOOKBACK_DAYS: 7
          SQL_DB_PATH: data/news.db
          CHROMA_DB_PATH: data/chroma_db
          CHROMA_COLLECTION: news_articles
        run: |
          python run_pipeline.py

      # Commit results if the pipeline produced new data
      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data outputs

          # Avoid creating empty commits
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update news pipeline data"
            git push
          fi